<!DOCTYPE html>
<html>
<head>
<title>Multi Step Form</title>
<link rel="stylesheet" href="multistep.css">
</head>

<body>

<div class="container">

<div class="progress">
<div id="progressBar"></div>
</div>

<form id="form">

<div class="step active">

<h3>Bước 1</h3>

<input type="text" id="name" placeholder="Họ tên">
<input type="date" id="birth">

<select id="gender">
<option value="">Chọn giới tính</option>
<option>Nam</option>
<option>Nữ</option>
</select>

<button type="button" id="next1">Tiếp theo</button>

</div>

<div class="step">

<h3>Bước 2</h3>

<input type="text" id="email">
<input type="password" id="pass">
<input type="password" id="confirmPass">

<button type="button" id="back1">Quay lại</button>
<button type="button" id="next2">Tiếp theo</button>

</div>

<div class="step">

<h3>Bước 3</h3>

<div id="summary"></div>

<button type="button" id="back2">Quay lại</button>
<button type="submit">Xác nhận</button>

</div>

</form>

</div>

<script src="multistep.js"></script>

</body>
</html>
